[tool:pytest]
testpaths = tests
timeout = 60
addopts = --tb=short -q

[coverage:run]
source = cogs,utils,maxima
omit =
    tests/*
    */__pycache__/*
    maxima_gui.py

[coverage:report]
show_missing = true
precision = 1
fail_under = 50
exclude_lines =
    pragma: no cover
    if __name__
    raise NotImplementedError
    except ImportError
    pass

[coverage:html]
directory = htmlcov
